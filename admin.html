<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MatPrep · Backoffice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b1220; --panel:#121c2e; --panel2:#182338; --line:#2a3a52; --text:#e8eef7; --muted:#8b9bb4;
  --teal:#2dd4bf; --teal2:#0d9488; --blue:#38bdf8; --rose:#fb7185; --amber:#fbbf24; --ok:#4ade80;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at 8% -8%,rgba(45,212,191,.12),transparent 30%),var(--bg);color:var(--text);font-family:Sora,sans-serif}
button,input{font-family:inherit}
a{color:var(--blue);text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:24px 18px 56px}
.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.brand{font-weight:800;font-size:22px;letter-spacing:-.02em}
.brand span{color:var(--teal)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:800px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.stat .k{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.stat .v{font-size:22px;font-weight:800;margin-top:4px;color:var(--teal)}
.layout{display:grid;grid-template-columns:340px 1fr;gap:14px}
@media(max-width:920px){.layout{grid-template-columns:1fr}}
.btn{border:0;border-radius:11px;padding:10px 14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--teal),var(--teal2));color:#042f2e;font-size:13px}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
.btn.danger{background:transparent;border:1px solid rgba(251,113,133,.45);color:var(--rose)}
.btn:disabled{opacity:.5;cursor:default}
input[type=password],input[type=search]{
  width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 13px;color:var(--text);outline:none
}
input:focus{border-color:var(--teal)}
.login{max-width:400px;margin:12vh auto;padding:26px}
.login h1{margin:0 0 8px;font-size:22px}
.login p{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.5}
.err{color:var(--rose);font-size:13px;margin-top:10px}
.hidden{display:none!important}
.h2{margin:0 0 10px;font-size:15px;font-weight:800}
.tiny{font-size:12px;color:var(--muted)}
.muted{color:var(--muted)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.toolbar input{flex:1;min-width:140px}
.alist{display:flex;flex-direction:column;gap:8px;max-height:68vh;overflow:auto;padding-right:2px}
.aitem{border:1px solid var(--line);background:var(--panel2);border-radius:12px;padding:12px;cursor:pointer;transition:border-color .15s,background .15s}
.aitem:hover{border-color:rgba(45,212,191,.4)}
.aitem.on{border-color:var(--teal);background:rgba(45,212,191,.1)}
.aitem .row1{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.aitem .nome{font-weight:700;font-size:14px}
.aitem .meta{margin-top:6px;display:flex;flex-wrap:wrap;gap:8px 12px;font-size:12px;color:var(--muted)}
.ip{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;color:var(--blue);font-weight:600}
.star{border:0;background:transparent;cursor:pointer;font-size:18px;line-height:1;padding:0;color:#4b5568}
.star.on{color:var(--amber)}
.pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 9px;font-size:11px;font-weight:700;border:1px solid rgba(45,212,191,.3);color:var(--teal);background:rgba(45,212,191,.1)}
.pill.warn{border-color:rgba(251,191,36,.4);color:var(--amber);background:rgba(251,191,36,.1)}
.pill.bad{border-color:rgba(251,113,133,.4);color:var(--rose);background:rgba(251,113,133,.1)}
.pill.ok{border-color:rgba(74,222,128,.4);color:var(--ok);background:rgba(74,222,128,.1)}
.empty{padding:36px 16px;text-align:center;color:var(--muted);font-size:14px;line-height:1.5}
.dhead{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-start;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
@media(max-width:700px){.dgrid{grid-template-columns:repeat(2,1fr)}}
.dstat{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.dstat .k{font-size:11px;color:var(--muted);font-weight:600}
.dstat .v{font-size:16px;font-weight:800;margin-top:2px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.tab{border:1px solid var(--line);background:var(--panel2);color:var(--muted);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer}
.tab.on{border-color:var(--teal);color:var(--teal);background:rgba(45,212,191,.12)}
.timeline{display:flex;flex-direction:column;gap:0;max-height:540px;overflow:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel2)}
.ev{display:grid;grid-template-columns:64px 1fr;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line)}
.ev:last-child{border-bottom:0}
.ev .when{font-size:11px;color:var(--muted);line-height:1.35;padding-top:2px}
.ev .t{font-weight:700;font-size:13.5px}
.ev .m{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.45}
.ev.ok .t{color:var(--ok)}
.ev.bad .t{color:var(--rose)}
.ev.boss .t{color:var(--amber)}
.bar{height:6px;background:#2a3a52;border-radius:99px;overflow:hidden;margin-top:6px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--blue))}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.filt{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:999px;padding:5px 10px;font-size:11.5px;font-weight:700;cursor:pointer}
.chip.on{border-color:var(--teal);color:var(--teal);background:rgba(45,212,191,.1)}
.actions{display:flex;gap:8px;flex-wrap:wrap}
</style>
</head>
<body>
<div id="loginView" class="login card">
  <div class="brand">Mat<span>Prep</span> Backoffice</div>
  <h1>Área de administração</h1>
  <p>Vê o aluno pelo IP, favorita, e acompanha o que fez sem ruído.</p>
  <form id="loginForm">
    <label class="tiny" for="pwd">Password</label>
    <input id="pwd" type="password" autocomplete="current-password" placeholder="passe123" required>
    <button class="btn" style="width:100%;margin-top:14px" type="submit">Entrar</button>
    <div id="loginErr" class="err hidden"></div>
  </form>
</div>

<div id="appView" class="wrap hidden">
  <div class="top">
    <div>
      <div class="brand">Mat<span>Prep</span> Backoffice</div>
      <div class="tiny">Alunos · IP · atividade importante</div>
    </div>
    <div class="actions">
      <a class="btn ghost" href="/" target="_blank">Plataforma</a>
      <button class="btn ghost" id="btnRefresh" type="button">Atualizar</button>
      <button class="btn danger" id="btnClear" type="button">Limpar alunos</button>
      <button class="btn ghost" id="btnLogout" type="button">Sair</button>
    </div>
  </div>

  <div id="overview" class="stats"></div>

  <div class="layout">
    <div class="card">
      <div class="h2">Alunos</div>
      <div class="toolbar">
        <input id="searchAluno" type="search" placeholder="Nome ou IP…">
        <label class="tiny" style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap">
          <input id="onlyFav" type="checkbox"> Favs
        </label>
      </div>
      <div id="alunosBody" class="alist"></div>
    </div>

    <div class="card" id="detailCard">
      <div class="empty" id="detailEmpty">Seleciona um aluno à esquerda.</div>
      <div id="detail" class="hidden"></div>
    </div>
  </div>
</div>

<script>
const TOKEN_KEY = 'matprep_admin_token';
let token = localStorage.getItem(TOKEN_KEY) || '';
let alunos = [];
let selectedId = null;
let detailCache = null;
let timelineMode = 'importantes';

const NOISE = new Set(['view','video_tick','licao_tempo','video_pause','presence']);
const $ = (id) => document.getElementById(id);

function fmtMin(sec) {
  const s = Number(sec) || 0;
  const m = Math.floor(s / 60);
  if (m >= 60) return `${Math.floor(m/60)}h ${m%60}m`;
  return `${m} min`;
}
function fmtDate(v) {
  if (!v) return '—';
  try {
    return new Date(v).toLocaleString('pt-PT', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
  } catch { return String(v); }
}
function fmtTime(v) {
  if (!v) return '';
  try {
    return new Date(v).toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit' });
  } catch { return ''; }
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function evTitle(ev) {
  const m = ev.meta || {};
  switch (ev.tipo) {
    case 'sessao_inicio': return 'Entrou na plataforma';
    case 'presence': return 'Online';
    case 'aprender_tema': return 'Abriu tema' + (ev.tema ? ': ' + ev.tema : '');
    case 'licao_aberta': return 'Abriu lição' + (ev.licao ? ' · ' + ev.licao : '');
    case 'licao_concluida': return 'Concluiu lição' + (ev.licao ? ' · ' + ev.licao : '');
    case 'material_aberto': return 'Abriu material' + (m.titulo ? ': ' + m.titulo : '');
    case 'video_play': return 'Viu vídeo' + (m.titulo ? ': ' + m.titulo : '');
    case 'video_youtube': return 'Abriu no YouTube' + (m.titulo ? ': ' + m.titulo : '');
    case 'pergunta_vista': return 'Viu pergunta' + (ev.questao_id ? ' · ' + ev.questao_id : '');
    case 'pergunta_respondida':
      return (m.ok ? 'Acertou pergunta' : 'Errou pergunta') + (ev.questao_id ? ' · ' + ev.questao_id : '');
    case 'exame_inicio': return 'Iniciou exame';
    case 'exame_fim': return 'Terminou exame' + (m.nota != null ? ' · nota ' + m.nota : '');
    case 'boss_inicio': return 'Arena · combate' + (m.nome ? ': ' + m.nome : '');
    case 'boss_vitoria': return 'Arena · vitória';
    case 'boss_derrota': return 'Arena · derrota';
    case 'item_usado': return 'Usou item' + (m.item ? ': ' + m.item : '');
    default: return ev.tipo;
  }
}
function evTone(ev) {
  if (ev.tipo === 'pergunta_respondida') return ev.meta && ev.meta.ok ? 'ok' : 'bad';
  if (ev.tipo === 'boss_vitoria' || ev.tipo === 'licao_concluida') return 'ok';
  if (ev.tipo === 'boss_derrota') return 'bad';
  if (String(ev.tipo).startsWith('boss') || ev.tipo === 'item_usado') return 'boss';
  return '';
}
function evDetail(ev) {
  const bits = [];
  if (ev.tema) bits.push('tema ' + ev.tema);
  if (ev.licao) bits.push('lição ' + ev.licao);
  if (ev.meta && ev.meta.dif) bits.push(ev.meta.dif);
  if (ev.meta && ev.meta.modo) bits.push(ev.meta.modo);
  if (ev.segundos) bits.push('+' + ev.segundos + 's');
  if (ev.ip) bits.push('IP ' + ev.ip);
  return bits.join(' · ');
}

async function api(path, opts = {}) {
  const headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
  if (token) headers.Authorization = 'Bearer ' + token;
  const res = await fetch(path, Object.assign({}, opts, { headers }));
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || ('Erro ' + res.status));
  return data;
}

function showApp(on) {
  $('loginView').classList.toggle('hidden', on);
  $('appView').classList.toggle('hidden', !on);
}

async function loadOverview() {
  const o = await api('/api/admin/overview');
  $('overview').innerHTML = [
    ['Alunos', o.totalAlunos],
    ['Ativos 24h', o.ativosHoje],
    ['Estudo', (o.minutosEstudo || 0) + ' min'],
    ['Vídeo', (o.minutosVideo || 0) + ' min'],
  ].map(([k,v]) => `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');
}

function renderAlunos() {
  const q = ($('searchAluno').value || '').trim().toLowerCase();
  const onlyFav = $('onlyFav').checked;
  const rows = alunos.filter(a => {
    if (onlyFav && !a.favorito) return false;
    if (!q) return true;
    return (a.nome || '').toLowerCase().includes(q)
      || (a.ultimo_ip || '').toLowerCase().includes(q)
      || (a.user_id || '').toLowerCase().includes(q);
  });
  $('alunosBody').innerHTML = rows.map(a => `
    <div class="aitem${a.user_id===selectedId?' on':''}" data-id="${a.user_id}">
      <div class="row1">
        <div class="nome">${escapeHtml(a.nome || 'Estudante')}${a.favorito?' <span class="pill warn">fav</span>':''}</div>
        <button class="star${a.favorito?' on':''}" type="button" data-fav="${a.user_id}" title="Favoritar">${a.favorito?'★':'☆'}</button>
      </div>
      <div class="meta">
        <span class="ip">${escapeHtml(a.ultimo_ip || 'sem IP')}</span>
        <span>${fmtDate(a.ultimo_acesso)}</span>
        <span>${a.precisao_pct ?? 0}% · ${fmtMin(a.segundos_estudo)}</span>
        ${a.sessoes > 1 ? `<span>${a.sessoes} sessões</span>` : ''}
      </div>
    </div>
  `).join('') || '<div class="empty">Sem alunos. Abre a plataforma e volta a atualizar.</div>';
}

async function loadAlunos() {
  const data = await api('/api/admin/alunos');
  alunos = data.alunos || [];
  renderAlunos();
}

function renderTimeline(eventos) {
  let list = eventos || [];
  if (timelineMode === 'importantes') list = list.filter(ev => !NOISE.has(ev.tipo));
  if (!list.length) {
    return '<div class="empty">Sem atividade importante ainda.</div>';
  }
  let lastDay = '';
  return `<div class="timeline">${list.map(ev => {
    const day = fmtDate(ev.created_at).split(',')[0] || fmtDate(ev.created_at);
    let dayHeader = '';
    if (day !== lastDay) {
      lastDay = day;
      dayHeader = `<div class="ev" style="grid-template-columns:1fr;background:rgba(0,0,0,.15)"><div class="tiny" style="font-weight:700;color:var(--teal)">${escapeHtml(day)}</div></div>`;
    }
    const tone = evTone(ev);
    const detail = evDetail(ev);
    return `${dayHeader}<div class="ev ${tone}">
      <div class="when">${fmtTime(ev.created_at)}</div>
      <div>
        <div class="t">${escapeHtml(evTitle(ev))}</div>
        ${detail ? `<div class="m">${escapeHtml(detail)}</div>` : ''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

async function selectAluno(id) {
  selectedId = id;
  renderAlunos();
  $('detailEmpty').classList.add('hidden');
  $('detail').classList.remove('hidden');
  $('detail').innerHTML = '<div class="empty">A carregar…</div>';

  const d = await api('/api/admin/alunos/' + id);
  detailCache = d;
  const a = d.aluno || {};

  $('detail').innerHTML = `
    <div class="dhead">
      <div>
        <div class="h2" style="margin:0;font-size:20px">${escapeHtml(a.nome || 'Estudante')}</div>
        <div class="tiny" style="margin-top:6px">Último acesso ${fmtDate(a.ultimo_acesso)}</div>
        <div style="margin-top:8px;font-size:14px">IP: <span class="ip">${escapeHtml(a.ultimo_ip || 'ainda sem IP — o aluno tem de abrir o site')}</span>${a.sessoes > 1 ? ` · <span class="tiny">${a.sessoes} sessões no mesmo IP</span>` : ''}</div>
      </div>
      <div class="actions">
        <button class="btn ghost" id="dFavBtn" type="button">${a.favorito ? '★ Favorito' : '☆ Favoritar'}</button>
        <button class="btn danger" id="dDelBtn" type="button">Apagar</button>
      </div>
    </div>
    <div class="dgrid">
      <div class="dstat"><div class="k">Precisão</div><div class="v">${a.precisao_pct ?? 0}%</div></div>
      <div class="dstat"><div class="k">Respondidas</div><div class="v">${a.perguntas_respondidas || 0}</div></div>
      <div class="dstat"><div class="k">Certas</div><div class="v">${a.perguntas_certas || 0}</div></div>
      <div class="dstat"><div class="k">Estudo</div><div class="v">${fmtMin(a.segundos_estudo)}</div></div>
      <div class="dstat"><div class="k">Vídeo</div><div class="v">${fmtMin(a.segundos_video)}</div></div>
      <div class="dstat"><div class="k">Lições OK</div><div class="v">${a.licoes_concluidas || 0}</div></div>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab on" data-tab="timeline" type="button">Atividade</button>
      <button class="tab" data-tab="licoes" type="button">Lições</button>
      <button class="tab" data-tab="videos" type="button">Vídeos</button>
      <button class="tab" data-tab="perguntas" type="button">Perguntas</button>
    </div>
    <div id="pane-timeline">
      <div class="filt">
        <button class="chip ${timelineMode==='importantes'?'on':''}" data-mode="importantes" type="button">Importantes</button>
        <button class="chip ${timelineMode==='tudo'?'on':''}" data-mode="tudo" type="button">Tudo</button>
      </div>
      <div id="timelineBox">${renderTimeline(d.eventos)}</div>
    </div>
    <div id="pane-licoes" class="hidden">
      <table><thead><tr><th>Tema</th><th>Lição</th><th>Tempo</th><th>Estado</th></tr></thead><tbody>
        ${(d.licoes||[]).map(l=>`<tr>
          <td>${escapeHtml(l.tema)}</td><td>${escapeHtml(l.licao)}</td><td>${fmtMin(l.segundos_lidos)}</td>
          <td>${l.concluida?'<span class="pill ok">Concluída</span>':'<span class="pill warn">Em curso</span>'} · ${l.aberturas||0}x</td>
        </tr>`).join('') || '<tr><td colspan="4" class="empty">Nada ainda.</td></tr>'}
      </tbody></table>
    </div>
    <div id="pane-videos" class="hidden">
      <table><thead><tr><th>Vídeo</th><th>Visto</th><th>%</th></tr></thead><tbody>
        ${(d.videos||[]).map(v=>{
          const pct=Math.min(100,v.percentual||0);
          return `<tr><td><b>${escapeHtml(v.titulo||v.video_id)}</b><div class="bar"><i style="width:${pct}%"></i></div></td>
          <td>${fmtMin(v.segundos_vistos)}</td><td>${pct}%</td></tr>`;
        }).join('') || '<tr><td colspan="3" class="empty">Nenhum vídeo.</td></tr>'}
      </tbody></table>
    </div>
    <div id="pane-perguntas" class="hidden">
      <table><thead><tr><th>Pergunta</th><th>Tema</th><th>Certas</th><th>Erradas</th></tr></thead><tbody>
        ${(d.perguntas||[]).map(p=>`<tr>
          <td>${escapeHtml(p.questao_id)}</td><td>${escapeHtml(p.tema||'—')}</td>
          <td class="pill ok" style="border:0;background:transparent">${p.certas||0}</td>
          <td style="color:var(--rose);font-weight:700">${p.erradas||0}</td>
        </tr>`).join('') || '<tr><td colspan="4" class="empty">Nenhuma pergunta.</td></tr>'}
      </tbody></table>
    </div>`;

  $('dFavBtn').onclick = () => toggleFavorito(a.user_id).catch(alert);
  $('dDelBtn').onclick = () => apagarAluno(a.user_id).catch(alert);
  wireDetailUi();
}

function wireDetailUi() {
  document.querySelectorAll('#tabs .tab').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('#tabs .tab').forEach(b => b.classList.toggle('on', b === btn));
      ['timeline','licoes','videos','perguntas'].forEach(name => {
        const pane = $('pane-' + name);
        if (pane) pane.classList.toggle('hidden', name !== btn.dataset.tab);
      });
    };
  });
  document.querySelectorAll('[data-mode]').forEach(btn => {
    btn.onclick = () => {
      timelineMode = btn.dataset.mode;
      document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('on', b === btn));
      if (detailCache) $('timelineBox').innerHTML = renderTimeline(detailCache.eventos);
    };
  });
}

async function toggleFavorito(id) {
  const data = await api('/api/admin/alunos/' + id + '/favorito', { method: 'POST', body: '{}' });
  const a = alunos.find(x => x.user_id === id);
  if (a) a.favorito = !!data.favorito;
  if (detailCache && detailCache.aluno && detailCache.aluno.user_id === id) {
    detailCache.aluno.favorito = !!data.favorito;
  }
  renderAlunos();
  if (selectedId === id) await selectAluno(id);
}

async function apagarAluno(id) {
  if (!confirm('Apagar este aluno e toda a atividade?')) return;
  await api('/api/admin/alunos/' + id, { method: 'DELETE' });
  selectedId = null;
  $('detail').classList.add('hidden');
  $('detailEmpty').classList.remove('hidden');
  await refreshAll();
}

async function limparTodos() {
  if (!confirm('Isto apaga TODOS os alunos. Continuar?')) return;
  const ok = prompt('Escreve LIMPAR para confirmar');
  if (ok !== 'LIMPAR') return;
  const r = await api('/api/admin/limpar-alunos', { method: 'POST', body: JSON.stringify({ confirm: 'LIMPAR' }) });
  alert('Apagados: ' + (r.deleted || 0));
  selectedId = null;
  $('detail').classList.add('hidden');
  $('detailEmpty').classList.remove('hidden');
  await refreshAll();
}

$('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  $('loginErr').classList.add('hidden');
  try {
    const data = await api('/api/admin/login', {
      method: 'POST',
      body: JSON.stringify({ password: $('pwd').value }),
    });
    token = data.token;
    localStorage.setItem(TOKEN_KEY, token);
    showApp(true);
    await refreshAll();
  } catch (err) {
    $('loginErr').textContent = err.message;
    $('loginErr').classList.remove('hidden');
  }
});

$('btnLogout').onclick = () => {
  token = '';
  localStorage.removeItem(TOKEN_KEY);
  showApp(false);
};
$('btnRefresh').onclick = () => refreshAll().catch(alert);
$('btnClear').onclick = () => limparTodos().catch(alert);
$('searchAluno').oninput = () => renderAlunos();
$('onlyFav').onchange = () => renderAlunos();
$('alunosBody').onclick = (e) => {
  const favBtn = e.target.closest('button[data-fav]');
  if (favBtn) {
    e.stopPropagation();
    toggleFavorito(favBtn.dataset.fav).catch(alert);
    return;
  }
  const item = e.target.closest('[data-id]');
  if (item) selectAluno(item.dataset.id).catch(alert);
};

async function refreshAll() {
  await loadOverview();
  await loadAlunos();
  if (selectedId) await selectAluno(selectedId);
}

(async () => {
  if (!token) return;
  try {
    showApp(true);
    await refreshAll();
  } catch {
    token = '';
    localStorage.removeItem(TOKEN_KEY);
    showApp(false);
  }
})();
</script>
</body>
</html>
